<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carrito de Compras — TechShop</title>
  <meta name="description" content="Tu carrito de compras en TechShop."/>
  <link rel="stylesheet" href="/css/styles.css"/>
  <style>
    .cart-page { padding: 3rem 0 5rem; }
    .cart-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 2rem;
      align-items: start;
    }
    .cart-item {
      display: flex; gap: 1.2rem; align-items: center;
      padding: 1.2rem;
      background: var(--bg-glass);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius);
      margin-bottom: 1rem;
      transition: var(--transition);
    }
    .cart-item:hover { border-color: rgba(124,58,237,0.3); }
    .item-emoji { font-size: 3rem; flex-shrink: 0; width: 70px; text-align: center; }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-weight: 700; font-size: 1rem; margin-bottom: 0.3rem; }
    .item-price { color: var(--accent-light); font-weight: 700; font-size: 1.1rem; }
    .item-subtotal { color: var(--text-secondary); font-size: 0.85rem; }
    .item-actions {
      display: flex; flex-direction: column; align-items: center; gap: 0.7rem;
    }
    .qty-mini {
      display: flex; align-items: center; gap: 0.5rem;
    }
    .qty-mini button {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid var(--border-glass);
      background: var(--bg-glass); color: var(--text-primary);
      cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition);
    }
    .qty-mini button:hover { background: var(--accent); border-color: var(--accent); }
    .qty-mini span { font-weight: 700; min-width: 24px; text-align: center; }
    .summary-card {
      background: var(--bg-glass);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-lg);
      padding: 1.8rem;
      position: sticky; top: 90px;
    }
    .summary-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 1.5rem; }
    .summary-row {
      display: flex; justify-content: space-between;
      font-size: 0.9rem; color: var(--text-secondary);
      margin-bottom: 0.8rem;
    }
    .summary-row.total {
      font-size: 1.2rem; font-weight: 800;
      color: var(--text-primary);
      padding-top: 1rem;
      border-top: 1px solid var(--border-glass);
      margin-top: 0.5rem;
    }
    .summary-row.total .amount {
      background: linear-gradient(135deg, var(--accent-light), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .empty-cart {
      text-align: center; padding: 5rem 2rem;
    }
    .empty-cart .icon { font-size: 5rem; margin-bottom: 1.5rem; }
    @media(max-width:768px) {
      .cart-layout { grid-template-columns: 1fr; }
      .summary-card { position: static; }
      .cart-item { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
<nav class="navbar">
  <a href="/" class="navbar-brand">🛒 Tech<span>Shop</span></a>
  <ul class="navbar-nav" id="nav-auth"></ul>
</nav>

<div class="container cart-page">
  <h1 class="section-title">🛒 Mi Carrito</h1>
  <p class="section-subtitle">Revisa y ajusta tus productos antes de comprar.</p>

  <div id="cart-container">
    <div class="loader"><div class="spinner"></div><span>Cargando carrito...</span></div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    requireAuth();
    renderNavbar();
    loadCart();
  });

  async function loadCart() {
    try {
      const data = await authFetch('/cart');
      renderCart(data);
    } catch(e) {
      showToast('Error cargando el carrito', 'error');
    }
  }

  const productEmojis = { 1: '💻', 2: '👗', 3: '🏠', 4: '⚽', 5: '📚' };

  function renderCart(data) {
    const container = document.getElementById('cart-container');
    if (data.items.length === 0) {
      container.innerHTML = `
        <div class="empty-cart">
          <div class="icon">🛒</div>
          <h2>Tu carrito está vacío</h2>
          <p class="text-muted mt-1">Agrega productos desde el catálogo.</p>
          <a href="/" class="btn btn-primary btn-lg mt-2">Explorar Productos</a>
        </div>`;
      return;
    }
    container.innerHTML = `
      <div class="cart-layout">
        <div id="cart-items-list">
          ${data.items.map(item => renderCartItem(item)).join('')}
          <button class="btn btn-danger btn-sm mt-2" onclick="clearCart()">🗑 Vaciar carrito</button>
        </div>
        <div class="summary-card">
          <div class="summary-title">📋 Resumen del Pedido</div>
          <div class="summary-row"><span>Productos (${data.items.length})</span><span>${formatPrice(data.total)}</span></div>
          <div class="summary-row"><span>Envío estimado</span><span style="color:var(--success)">Gratis</span></div>
          <div class="summary-row total">
            <span>Total</span>
            <span class="amount">${formatPrice(data.total)}</span>
          </div>
          <a href="/checkout" class="btn btn-primary btn-full btn-lg mt-2">
            Proceder al Pago →
          </a>
          <a href="/" class="btn btn-secondary btn-full mt-1">Seguir Comprando</a>
        </div>
      </div>`;
  }

  function renderCartItem(item) {
    return `
      <div class="cart-item" id="cart-item-${item.id}">
        <div class="item-emoji">${productEmojis[item.category_id] || '📦'}</div>
        <div class="item-info">
          <div class="item-name">${item.nombre}</div>
          <div class="item-price">${formatPrice(item.precio)}</div>
          <div class="item-subtotal">Subtotal: ${formatPrice(item.subtotal)}</div>
        </div>
        <div class="item-actions">
          <div class="qty-mini">
            <button onclick="updateQty(${item.id}, ${item.cantidad - 1})">−</button>
            <span>${item.cantidad}</span>
            <button onclick="updateQty(${item.id}, ${item.cantidad + 1})" ${item.cantidad >= item.stock ? 'disabled' : ''}>+</button>
          </div>
          <button class="btn btn-danger btn-sm" onclick="removeItem(${item.id})">Eliminar</button>
        </div>
      </div>`;
  }

  async function updateQty(itemId, newQty) {
    if (newQty < 1) { await removeItem(itemId); return; }
    try {
      await authFetch(`/cart/${itemId}`, { method: 'PUT', body: JSON.stringify({ cantidad: newQty }) });
      loadCart();
    } catch(err) { showToast(err.message, 'error'); }
  }

  async function removeItem(itemId) {
    try {
      await authFetch(`/cart/${itemId}`, { method: 'DELETE' });
      showToast('Producto eliminado', 'info');
      loadCart(); updateCartBadge();
    } catch(err) { showToast(err.message, 'error'); }
  }

  async function clearCart() {
    if (!confirm('¿Vaciar todo el carrito?')) return;
    try {
      await authFetch('/cart', { method: 'DELETE' });
      showToast('Carrito vaciado', 'info');
      loadCart(); updateCartBadge();
    } catch(err) { showToast(err.message, 'error'); }
  }
</script>
</body>
</html>
