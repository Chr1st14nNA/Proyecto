<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Detalle de Producto — TechShop</title>
  <meta name="description" content="Detalle del producto en TechShop."/>
  <link rel="stylesheet" href="/css/styles.css"/>
  <style>
    .product-detail { padding: 3rem 0; }
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: start;
    }
    .product-image-big {
      background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(6,182,212,0.1));
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-lg);
      height: 400px;
      display: flex; align-items: center; justify-content: center;
      font-size: 9rem;
    }
    .product-info-card {
      background: var(--bg-glass);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-lg);
      padding: 2rem;
    }
    .detail-category {
      font-size: 0.8rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1px; color: var(--accent-light); margin-bottom: 0.6rem;
    }
    .detail-name {
      font-size: 1.8rem; font-weight: 800; line-height: 1.2;
      margin-bottom: 0.8rem;
    }
    .detail-desc {
      color: var(--text-secondary); font-size: 0.95rem;
      line-height: 1.7; margin-bottom: 1.5rem;
    }
    .detail-price {
      font-size: 2.5rem; font-weight: 800;
      background: linear-gradient(135deg, var(--accent-light), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }
    .qty-selector {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .qty-btn {
      width: 38px; height: 38px;
      border-radius: 50%; border: 1px solid var(--border-glass);
      background: var(--bg-glass); color: var(--text-primary);
      font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition);
    }
    .qty-btn:hover { background: var(--accent); border-color: var(--accent); }
    .qty-num { font-size: 1.2rem; font-weight: 700; min-width: 30px; text-align: center; }
    .detail-meta {
      display: flex; gap: 1rem; flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .meta-badge {
      font-size: 0.8rem; font-weight: 600;
      padding: 0.35rem 0.9rem;
      border-radius: 100px;
      background: var(--bg-glass); border: 1px solid var(--border-glass);
      color: var(--text-secondary);
    }
    .btn-actions { display: flex; gap: 1rem; }
    @media(max-width:768px) {
      .detail-grid { grid-template-columns: 1fr; }
      .product-image-big { height: 250px; font-size: 6rem; }
      .btn-actions { flex-direction: column; }
    }
  </style>
</head>
<body>
<nav class="navbar">
  <a href="/" class="navbar-brand">🛒 Tech<span>Shop</span></a>
  <ul class="navbar-nav" id="nav-auth"></ul>
</nav>

<div class="container product-detail">
  <a href="/" class="btn btn-secondary btn-sm mb-3">← Regresar al catálogo</a>
  <div id="product-container">
    <div class="loader"><div class="spinner"></div><span>Cargando producto...</span></div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script>
  const productEmojis = { 1: '💻', 2: '👗', 3: '🏠', 4: '⚽', 5: '📚' };
  let currentProduct = null;
  let qty = 1;

  document.addEventListener('DOMContentLoaded', async () => {
    renderNavbar();
    const id = getParam('id');
    if (!id) { window.location.href = '/'; return; }
    try {
      const p = await apiFetch(`/products/${id}`);
      currentProduct = p;
      document.title = `${p.nombre} — TechShop`;
      renderProduct(p);
    } catch(e) {
      document.getElementById('product-container').innerHTML =
        `<div class="empty-state"><div class="icon">⚠️</div><p>Producto no encontrado.</p></div>`;
    }
  });

  function renderProduct(p) {
    const emoji = productEmojis[p.category_id] || '📦';
    const stockClass = p.stock === 0 ? 'out' : p.stock < 5 ? 'low' : '';
    const stockLabel = p.stock === 0 ? 'Agotado' : p.stock < 5 ? `Últimas ${p.stock} unidades` : `${p.stock} en stock`;
    document.getElementById('product-container').innerHTML = `
      <div class="detail-grid">
        <div class="product-image-big">${emoji}</div>
        <div class="product-info-card">
          <div class="detail-category">${p.categoria || 'General'}</div>
          <h1 class="detail-name">${p.nombre}</h1>
          <p class="detail-desc">${p.descripcion || 'Sin descripción disponible.'}</p>
          <div class="detail-price">${formatPrice(p.precio)}</div>
          <div class="detail-meta">
            <span class="meta-badge stock-badge ${stockClass}">${stockLabel}</span>
            <span class="meta-badge">🚚 Envío a domicilio</span>
            <span class="meta-badge">🔒 Compra segura</span>
          </div>
          <div class="qty-selector" ${p.stock===0?'style="display:none"':''}>
            <span style="color:var(--text-secondary); font-size:0.9rem; font-weight:600;">Cantidad:</span>
            <button class="qty-btn" onclick="changeQty(-1)">−</button>
            <span class="qty-num" id="qty-display">1</span>
            <button class="qty-btn" onclick="changeQty(1)">+</button>
            <span style="color:var(--text-muted); font-size:0.8rem;">Máx. ${p.stock}</span>
          </div>
          <div class="btn-actions">
            <button class="btn btn-primary btn-lg" onclick="addToCart()" ${p.stock===0?'disabled':''} id="btn-add">
              ${p.stock===0 ? 'Agotado' : '🛒 Agregar al Carrito'}
            </button>
            <a href="/carrito" class="btn btn-secondary btn-lg">Ver Carrito</a>
          </div>
        </div>
      </div>`;
  }

  function changeQty(delta) {
    const max = currentProduct?.stock || 1;
    qty = Math.max(1, Math.min(max, qty + delta));
    document.getElementById('qty-display').textContent = qty;
  }

  async function addToCart() {
    if (!isLoggedIn()) {
      showToast('Inicia sesión para agregar al carrito', 'error');
      setTimeout(() => window.location.href = '/login', 1000);
      return;
    }
    const btn = document.getElementById('btn-add');
    btn.textContent = 'Agregando...'; btn.disabled = true;
    try {
      await authFetch('/cart', {
        method: 'POST',
        body: JSON.stringify({ product_id: currentProduct.id, cantidad: qty })
      });
      showToast(`${qty} producto(s) agregado(s) al carrito ✓`, 'success');
      updateCartBadge();
    } catch(err) {
      showToast(err.message, 'error');
    } finally {
      btn.textContent = '🛒 Agregar al Carrito'; btn.disabled = false;
    }
  }
</script>
</body>
</html>
