<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi Perfil — TechShop</title>
  <meta name="description" content="Gestiona tu perfil y consulta tu historial de pedidos en TechShop."/>
  <link rel="stylesheet" href="/css/styles.css"/>
  <style>
    .profile-page { padding: 3rem 0 5rem; }
    .profile-header {
      background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(6,182,212,0.1));
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
      display: flex; align-items: center; gap: 2rem;
      margin-bottom: 2.5rem;
    }
    .avatar {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; font-weight: 800; color: #fff;
      flex-shrink: 0;
      box-shadow: 0 0 30px var(--accent-glow);
    }
    .user-meta h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.3rem; }
    .user-meta p  { color: var(--text-secondary); font-size: 0.9rem; }
    .user-meta .joined { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.3rem; }
    .orders-title { font-size: 1.3rem; font-weight: 800; margin-bottom: 1.2rem; }
    .order-card {
      background: var(--bg-glass);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius);
      padding: 1.4rem;
      margin-bottom: 1rem;
      cursor: pointer;
      transition: var(--transition);
    }
    .order-card:hover { border-color: rgba(124,58,237,0.4); }
    .order-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 0.8rem;
    }
    .order-id { font-weight: 700; font-size: 0.95rem; }
    .order-date { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.2rem; }
    .order-badge {
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0.3rem 0.8rem; border-radius: 100px;
    }
    .badge-confirmado { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
    .badge-pendiente  { background: rgba(245,158,11,0.15); color: var(--warning);  border: 1px solid rgba(245,158,11,0.3); }
    .order-info {
      display: flex; justify-content: space-between; align-items: center;
    }
    .order-products { color: var(--text-secondary); font-size: 0.85rem; }
    .order-total {
      font-size: 1.2rem; font-weight: 800;
      background: linear-gradient(135deg, var(--accent-light), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .order-address { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem; }
    .modal {
      display: none; position: fixed; inset: 0; z-index: 999;
      background: rgba(10,10,18,0.85); backdrop-filter: blur(8px);
      align-items: center; justify-content: center; padding: 1rem;
    }
    .modal.show { display: flex; }
    .modal-box {
      background: var(--bg-secondary);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-lg);
      padding: 2rem; max-width: 500px; width: 100%;
      max-height: 80vh; overflow-y: auto;
    }
    .modal-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 1.2rem; }
    .modal-item { display: flex; gap: 1rem; align-items: center; padding: 0.7rem 0; border-bottom: 1px solid var(--border-glass); }
    .modal-item:last-child { border-bottom: none; }
    @media(max-width:600px) {
      .profile-header { flex-direction: column; text-align: center; }
      .order-info { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
    }
  </style>
</head>
<body>
<nav class="navbar">
  <a href="/" class="navbar-brand">🛒 Tech<span>Shop</span></a>
  <ul class="navbar-nav" id="nav-auth"></ul>
</nav>

<div class="container profile-page">
  <!-- Perfil del usuario -->
  <div id="profile-header">
    <div class="loader"><div class="spinner"></div></div>
  </div>

  <!-- Historial de pedidos -->
  <div class="orders-title">📦 Mis Pedidos</div>
  <div id="orders-container">
    <div class="loader"><div class="spinner"></div><span>Cargando pedidos...</span></div>
  </div>
</div>

<!-- Modal detalle de pedido -->
<div class="modal" id="order-modal" onclick="closeModal(event)">
  <div class="modal-box" id="modal-content"></div>
</div>

<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script>
  const productEmojis = { 1: '💻', 2: '👗', 3: '🏠', 4: '⚽', 5: '📚' };

  document.addEventListener('DOMContentLoaded', async () => {
    requireAuth();
    renderNavbar();

    // Cargar perfil
    try {
      const user = await authFetch('/auth/me');
      const initial = user.nombre.charAt(0).toUpperCase();
      const joined = new Date(user.created_at).toLocaleDateString('es-MX', { year:'numeric', month:'long', day:'numeric' });
      document.getElementById('profile-header').innerHTML = `
        <div class="profile-header">
          <div class="avatar">${initial}</div>
          <div class="user-meta">
            <h2>${user.nombre}</h2>
            <p>📧 ${user.email}</p>
            ${user.telefono ? `<p>📱 ${user.telefono}</p>` : ''}
            <p class="joined">🗓 Miembro desde ${joined}</p>
          </div>
          <div style="margin-left:auto;">
            <button onclick="logout()" class="btn btn-secondary btn-sm">Cerrar Sesión</button>
          </div>
        </div>`;
    } catch(e) { console.error(e); }

    // Cargar pedidos
    loadOrders();
  });

  async function loadOrders() {
    try {
      const orders = await authFetch('/orders');
      const container = document.getElementById('orders-container');
      if (orders.length === 0) {
        container.innerHTML = `
          <div class="empty-state" style="text-align:center; padding:3rem 0; color:var(--text-secondary);">
            <div style="font-size:4rem; margin-bottom:1rem;">📭</div>
            <h3>Aún no tienes pedidos</h3>
            <a href="/" class="btn btn-primary mt-2">Ir al catálogo</a>
          </div>`;
        return;
      }
      container.innerHTML = orders.map(o => `
        <div class="order-card" onclick="viewOrder(${o.id})">
          <div class="order-header">
            <div>
              <div class="order-id">Pedido #${o.id}</div>
              <div class="order-date">${new Date(o.created_at).toLocaleString('es-MX')}</div>
            </div>
            <span class="order-badge badge-${o.estado}">${o.estado}</span>
          </div>
          <div class="order-info">
            <span class="order-products">📦 ${o.num_productos} producto(s)</span>
            <span class="order-total">${formatPrice(o.total)}</span>
          </div>
          <div class="order-address">📍 ${o.direccion_envio}, ${o.ciudad}</div>
        </div>`).join('');
    } catch(e) { showToast('Error cargando pedidos', 'error'); }
  }

  async function viewOrder(orderId) {
    try {
      const order = await authFetch(`/orders/${orderId}`);
      const itemsHtml = order.items.map(i => `
        <div class="modal-item">
          <div style="font-size:2rem;">${productEmojis[i.category_id] || '📦'}</div>
          <div style="flex:1">
            <div style="font-weight:600; font-size:0.9rem;">${i.nombre}</div>
            <div style="font-size:0.8rem; color:var(--text-secondary);">x${i.cantidad} — ${formatPrice(i.precio_unitario)} c/u</div>
          </div>
          <div style="font-weight:700; color:var(--accent-light);">${formatPrice(i.precio_unitario * i.cantidad)}</div>
        </div>`).join('');

      document.getElementById('modal-content').innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
          <div class="modal-title" style="margin:0;">📦 Pedido #${order.id}</div>
          <button onclick="closeModalDirect()" style="background:none;border:none;color:var(--text-secondary);font-size:1.5rem;cursor:pointer;">×</button>
        </div>
        <div style="background:rgba(255,255,255,0.04); border-radius:var(--radius-sm); padding:1rem; margin-bottom:1rem; font-size:0.85rem;">
          <p>📍 <strong>Envío:</strong> ${order.direccion_envio}, ${order.ciudad} ${order.codigo_postal || ''}</p>
          ${order.telefono_envio ? `<p>📱 <strong>Tel:</strong> ${order.telefono_envio}</p>` : ''}
          ${order.notas ? `<p>📝 <strong>Notas:</strong> ${order.notas}</p>` : ''}
          <p>📅 <strong>Fecha:</strong> ${new Date(order.created_at).toLocaleString('es-MX')}</p>
        </div>
        ${itemsHtml}
        <div style="display:flex; justify-content:space-between; align-items:center; padding-top:1rem; border-top:1px solid var(--border-glass); margin-top:0.5rem;">
          <strong>Total</strong>
          <span style="font-size:1.3rem; font-weight:800; background:linear-gradient(135deg,var(--accent-light),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">${formatPrice(order.total)}</span>
        </div>`;
      document.getElementById('order-modal').classList.add('show');
    } catch(e) { showToast('Error cargando el pedido', 'error'); }
  }

  function closeModal(e) {
    if (e.target === document.getElementById('order-modal')) closeModalDirect();
  }
  function closeModalDirect() {
    document.getElementById('order-modal').classList.remove('show');
  }
</script>
</body>
</html>
